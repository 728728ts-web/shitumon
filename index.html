<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Discord 匿名送信</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        textarea { width: 100%; max-width: 400px; height: 100px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; padding: 10px; }
        button { background-color: #5865F2; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #4752c4; }
    </style>
</head>
<body>

    <h2>Discordへ匿名メッセージを送る</h2>
    <textarea id="message" placeholder="ここにメッセージを入力してください"></textarea><br>
    <button onclick="sendToDiscord()">送信する</button>

    <script>
    async function sendToDiscord() {
        const url = "https://discordapp.com/api/webhooks/1477645908324646925/bKOASQBtKH-P2Wufi_MB_YDqK5KvmYrydgU_RyQ36KkE5kRNHuuBjjhmPj9FzgTrHVD8";
        const content = document.getElementById('message').value;

        if (!content) {
            alert("メッセージを入力してください！");
            return;
        }

        const payload = {
            content: "📩 **HTMLからメッセージが届きました：**\n" + content
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("送信完了しました！");
                document.getElementById('message').value = "";
            } else {
                alert("送信に失敗しました。ステータス: " + response.status);
            }
        } catch (error) {
            alert("エラーが発生しました: " + error);
        }
    }
    </script>

</body>
</html>
